apiVersion: v1
kind: Service
metadata:
  name: kube-lens-web
  namespace: kube-lens-web
  labels:
    app: kube-lens-web
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: kube-lens-web
---
# Optional: NodePort service for direct access
apiVersion: v1
kind: Service
metadata:
  name: kube-lens-web-nodeport
  namespace: kube-lens-web
  labels:
    app: kube-lens-web
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
      nodePort: 30080
  selector:
    app: kube-lens-web
