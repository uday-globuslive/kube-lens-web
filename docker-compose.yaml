version: '3.8'

services:
  kube-lens-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: kube-lens-web:latest
    container_name: kube-lens-web
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    volumes:
      # Mount kubeconfig for local development
      - ~/.kube:/home/nodeapp/.kube:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

# For development with hot-reload
  kube-lens-web-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: kube-lens-web:dev
    container_name: kube-lens-web-dev
    ports:
      - "3001:3001"
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3001
    volumes:
      - ./server:/app/server
      - ./client/src:/app/client/src
      - ~/.kube:/home/nodeapp/.kube:ro
    profiles:
      - dev
